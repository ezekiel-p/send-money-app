name: send_money_app
description: A Flutter Send Money app using Clean Architecture, BLoC, and Repository Pattern.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # API
  http: ^1.2.0

  # Formatting (dates, currency)
  intl: ^0.18.1

  # Store small amouts of primitive data
  shared_preferences: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
